# 订阅源
proxy-providers:
  GLaDOS:
    type: http
    url: "你的URL"
    interval: 86400
    path: ./proxy-providers/glados.yaml
    health-check: {enable: true, interval: 3600, url: http://cp.cloudflare.com/generate_204}
  TAG:
    type: http
    url: "你的URL"
    interval: 86400
    path: ./proxy-providers/tag.yaml
    health-check: {enable: true, interval: 3600, url: http://cp.cloudflare.com/generate_204}
  Mojie:
    type: http
    url: "你的URL"
    interval: 86400
    path: ./proxy-providers/mojie.yaml
    health-check: {enable: true, interval: 3600, url: http://cp.cloudflare.com/generate_204}

# 策略组
proxy-groups:
  - {name: 🇭🇰 香港节点, type: select, use: [GLaDOS, TAG, Mojie], filter: "(?i)港|HK|Hong Kong|🇭🇰|HongKong"}
  - {name: 🇨🇳 台湾节点, type: select, use: [GLaDOS, TAG, Mojie], filter: "(?i)台|新北|彰化|TW|Taiwan"}
  - {name: 🇸🇬 狮城节点, type: select, use: [GLaDOS, TAG, Mojie], filter: "(?i)新加坡|坡|狮城|SG|Singapore"}
  - {name: 🇯🇵 日本节点, type: select, use: [GLaDOS, TAG, Mojie], filter: "(?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan"}
  - {name: 🇺🇲 美国节点, type: select, use: [GLaDOS, TAG, Mojie], filter: "(?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States"}
  - {name: 🇰🇷 韩国节点, type: select, use: [GLaDOS, TAG, Mojie], filter: "(?i)KR|Korea|KOR|首尔|韩|韓"}
  - {name: 🏡 家宽节点, type: select, use: [GLaDOS, TAG, Mojie], filter: "(?i)家宽|家庭"}
  - {name: 🎥 奈飞节点, type: select, use: [GLaDOS, TAG, Mojie], filter: "(?i)NF|奈飞|解锁|Netflix|NETFLIX|Media"}
  - {name: 🚀 手动切换, type: select, use: [GLaDOS, TAG, Mojie]}

  - name: 🇭🇰 香港故转
    type: fallback
    use: [GLaDOS, TAG, Mojie]
    filter: "(?i)港|HK|Hong Kong|🇭🇰|HongKong"
    exclude-filter: "(?i)深港|家宽|游戏|剩余|流量|0.5|0.5倍|0.5x|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x|5.0|5倍|5x"
    url: http://cp.cloudflare.com/generate_204
    interval: 300

  - name: 🇨🇳 台湾故转
    type: fallback
    use: [GLaDOS, TAG, Mojie]
    filter: "(?i)台|新北|彰化|TW|Taiwan"
    exclude-filter: "(?i)家宽|游戏|剩余|流量|0.5|0.5倍|0.5x|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x|5.0|5倍|5x"
    url: http://cp.cloudflare.com/generate_204
    interval: 300

  - name: 🇯🇵 日本故转
    type: fallback
    use: [GLaDOS, TAG, Mojie]
    filter: "(?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan"
    exclude-filter: "(?i)家宽|游戏|剩余|流量|0.5|0.5倍|0.5x|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x|5.0|5倍|5x"
    url: http://cp.cloudflare.com/generate_204
    interval: 300

  # 业务组
  - {name: 🚀 节点选择, type: select, proxies: [🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇰🇷 韩国节点, 🚀 手动切换, 🇭🇰 香港故转, 🇨🇳 台湾故转, 🇯🇵 日本故转, 🏡 家宽节点, DIRECT]}
  - {name: ♻️ Speedtest, type: select, proxies: [🎯 全球直连, 🚀 节点选择, 🚀 手动切换]}
  - {name: 🏗️ GitHub, type: select, proxies: [🚀 节点选择, 🎯 全球直连, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇭🇰 香港故转, 🇨🇳 台湾故转, 🇯🇵 日本故转, 🏡 家宽节点, 🚀 手动切换]}
  - {name: 🤖 AI, type: select, proxies: [🏡 家宽节点, 🇺🇲 美国节点, 🇸🇬 狮城节点, 🇨🇳 台湾节点, 🇰🇷 韩国节点, 🇨🇳 台湾故转, 🚀 节点选择, 🚀 手动切换]}
  - {name: 🌍 国外媒体, type: select, proxies: [🇭🇰 香港故转, 🇨🇳 台湾故转, 🇯🇵 日本故转, 🚀 节点选择, 🎥 奈飞节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇰🇷 韩国节点, 🏡 家宽节点, 🚀 手动切换, DIRECT]}
  - {name: 🌏 国内媒体, type: select, proxies: [DIRECT, 🇭🇰 香港故转, 🇨🇳 台湾故转, 🇯🇵 日本故转, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇯🇵 日本节点, 🚀 节点选择]}
  - {name: 🪙 OKX, type: select, proxies: [🚀 节点选择, 🚀 手动切换]}
  - {name: 🔍️ Google, type: select, proxies: [🚀 节点选择, 🚀 手动切换]}
  - {name: 📢 GoogleFCM, type: select, proxies: [🚀 节点选择, DIRECT]}
  - {name: 🔍️ Copilot, type: select, proxies: [🤖 AI, 🚀 节点选择]}
  - {name: Ⓜ️ OneDrive, type: select, proxies: [🎯 全球直连, 🚀 节点选择]}
  - {name: Ⓜ️ Microsoft, type: select, proxies: [🎯 全球直连, 🚀 节点选择]}
  - {name: 🍎 Apple, type: select, proxies: [🎯 全球直连, 🚀 节点选择]}
  - {name: 📲 Telegram, type: select, proxies: [🚀 节点选择, 🚀 手动切换]}
  - {name: 🎮 Steam, type: select, proxies: [🎯 全球直连, 🚀 节点选择]}
  - {name: 🎮 游戏平台, type: select, proxies: [🚀 节点选择, DIRECT]}
  - {name: 📺 Youtube, type: select, proxies: [🌍 国外媒体, 🚀 节点选择]}
  - {name: 📺 Bahamut, type: select, proxies: [🇨🇳 台湾节点, 🇨🇳 台湾故转, 🚀 节点选择]}
  - {name: 📺 哔哩哔哩, type: select, proxies: [🎯 全球直连, 🇨🇳 台湾节点, 🇭🇰 香港节点, 🚀 节点选择]}
  - {name: 🎶 网易音乐, type: select, proxies: [🎯 全球直连, 🚀 节点选择]}
  - {name: 🎯 全球直连, type: select, proxies: [DIRECT]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [DIRECT, 🚀 节点选择, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇰🇷 韩国节点, 🇭🇰 香港故转, 🇨🇳 台湾故转, 🇯🇵 日本故转, 🏡 家宽节点, 🚀 手动切换]}

